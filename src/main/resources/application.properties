# ============================================================
#  MediCore HMS - Spring Boot + MySQL Configuration
#  File: src/main/resources/application.properties
# ============================================================

# ── MySQL Database Connection ─────────────────────────────
# ✅ Change 'root' and 'your_password' to your MySQL credentials
# ✅ Change 'medicore_db' to your preferred schema name
spring.datasource.url=jdbc:mysql://localhost:3306/medicore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Anuja@25
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
# update = auto-creates/updates tables based on @Entity classes
# (use 'create' only first time, then switch back to 'update')
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── Connection Pool (HikariCP) ────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── IMPORTANT: Disable Web Server ────────────────────────
# This is a desktop JavaFX app - we do NOT want a Tomcat server
spring.main.web-application-type=none

# ── Disable Spring Boot Banner ────────────────────────────
spring.main.banner-mode=off

# ── Logging ──────────────────────────────────────────────
logging.level.com.medicore=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
